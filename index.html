<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR-Swift | Telegram Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --bg-color: #1a1a1a;
            --container-bg: #242424;
            --text-color: #ffffff;
            --accent-color: #248bcf; /* Bleu Telegram */
            --input-bg: #333333;
            --border-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container principal */
        .app-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            background: var(--container-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 10px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; color: var(--accent-color); }
        p { font-size: 0.9rem; opacity: 0.8; margin-bottom: 20px; }

        /* Champs de saisie */
        select, input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: var(--border-radius);
            border: 1px solid #444;
            background: var(--input-bg);
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--accent-color); }

        /* Zone d'affichage du QR Code */
        #qrcode {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            margin: 20px 0;
            min-height: 128px;
            min-width: 128px;
        }

        /* Boutons */
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, opacity 0.3s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-channel {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
            margin-top: 20px;
        }

        /* Footer */
        .footer { font-size: 0.7rem; margin-top: 25px; opacity: 0.5; }

        /* Animation d'apparition */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-container fade-in">
        <h1>QR-Swift ⚡</h1>
        <p>Générez vos QR Codes instantanément</p>

        <select id="typeSelector" onchange="updatePlaceholder()">
            <option value="link">🔗 Lien URL</option>
            <option value="text">✍️ Texte simple</option>
            <option value="file">📁 Lien vers fichier / Image</option>
        </select>

        <input type="text" id="userInput" placeholder="https://votre-lien.com" oninput="generateQR()">

        <div id="qrcode"></div>

        <button class="btn" onclick="downloadQR()">📥 Télécharger l'image</button>

        <a href="https://t.me/VOTRE_CANAL" target="_blank" class="btn btn-channel">📢 Rejoindre notre Canal</a>

        <div class="footer">Optimisé pour Telegram Web App</div>
    </div>

    <script>
        // Initialisation de Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Étendre l'application
        
        // Appliquer les couleurs du thème Telegram si disponibles
        if (tg.themeParams.bg_color) {
            document.documentElement.style.setProperty('--bg-color', tg.themeParams.bg_color);
            document.documentElement.style.setProperty('--container-bg', tg.themeParams.secondary_bg_color || '#242424');
            document.documentElement.style.setProperty('--text-color', tg.themeParams.text_color);
            document.documentElement.style.setProperty('--accent-color', tg.themeParams.button_color);
        }

        // Variable globale pour le QR Code
        let qrcodeInstance = new QRCode(document.getElementById("qrcode"), {
            text: "https://t.me/VOTRE_CANAL",
            width: 180,
            height: 180,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function updatePlaceholder() {
            const type = document.getElementById('typeSelector').value;
            const input = document.getElementById('userInput');
            if(type === 'link') input.placeholder = "https://votre-lien.com";
            else if(type === 'text') input.placeholder = "Écrivez votre message...";
            else if(type === 'file') input.placeholder = "Lien de l'image (URL)...";
            generateQR();
        }

        function generateQR() {
            const val = document.getElementById('userInput').value;
            if (val.trim() === "") {
                qrcodeInstance.clear();
            } else {
                qrcodeInstance.makeCode(val);
            }
        }

        function downloadQR() {
            const img = document.querySelector('#qrcode img');
            if (img) {
                const link = document.createElement('a');
                link.download = 'qrcode-swift.png';
                link.href = img.src;
                link.click();
            } else {
                tg.showAlert("Veuillez saisir une valeur pour générer un QR Code.");
            }
        }

        // Animation de chargement
        window.onload = () => {
            console.log("App Ready");
        };
    </script>
</body>
</html>
