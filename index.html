<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGzy V2.1 - Master Market</title>
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #ff3e3e; --text: #ffffff; --dim: #a0a0a0; --border: #222; --success: #00ff88; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 80px; }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 35px; font-weight: 900; margin: 0; letter-spacing: -1.5px; }
        .header h1 span { color: var(--accent); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
        .stat-card small { color: var(--dim); font-size: 10px; text-transform: uppercase; display: block; }
        .item { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .item-name { font-size: 20px; font-weight: bold; color: #fff; }
        .item-type { font-size: 10px; background: var(--border); padding: 3px 8px; border-radius: 5px; color: var(--dim); }
        .bid-info { display: flex; gap: 15px; margin: 15px 0; padding: 10px 0; border-top: 1px solid #222; border-bottom: 1px solid #222; }
        .bid-label { font-size: 10px; color: var(--dim); text-transform: uppercase; display:block; }
        .bid-val { font-weight: bold; font-size: 15px; }
        .buy-btn { width: 100%; background: #fff; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        
        /* ADMIN UI */
        #admin-auth, #admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input { width: 100%; background: #1a1a1a; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box;}
        .btn-admin { background: var(--accent); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor:pointer; }
        #export-area { width: 100%; height: 100px; background: #000; color: #00ff88; font-family: monospace; font-size: 10px; margin-top: 10px; padding: 10px; border: 1px dashed #444; display:none; box-sizing: border-box;}

        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-item { color: var(--dim); font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <div class="header"><h1>OG<span>zy</span></h1><p>Marketplace Premium</p></div>
    <div class="stats-grid">
        <div class="stat-card"><small>Stock</small><b id="count-stock">0</b></div>
        <div class="stat-card"><small>Status</small><b style="color:var(--success)">Online</b></div>
    </div>
    <div id="items-container"></div>
</div>

<div class="nav">
    <div class="nav-item" onclick="hideAdmin()">Shop</div>
    <div class="nav-item" onclick="window.open('https://t.me/TON_PSEUDO')">Contact</div>
    <div class="nav-item" onclick="showAdminAuth()">Admin</div>
</div>

<div id="admin-auth">
    <h2>Access Control</h2>
    <input type="text" id="adm-user" placeholder="User">
    <input type="password" id="adm-pass" placeholder="Password">
    <button class="btn-admin" onclick="login()">Login</button>
    <button onclick="hideAdmin()" style="background:none; border:none; color:var(--dim); width:100%; margin-top:20px;">Retour</button>
</div>

<div id="admin-panel">
    <h2>OGzy Panel</h2>
    <button class="btn-admin" style="background:#444;" onclick="hideAdmin()">Quitter</button>
    <div style="margin-top:20px;">
        <input type="text" id="p-name" placeholder="@username">
        <input type="text" id="p-type" placeholder="TikTok / IG / 3L">
        <input type="text" id="p-bin" placeholder="BIN (ex: 200$)">
        <input type="text" id="p-co" placeholder="C/O (ex: 120$)">
        <button class="btn-admin" onclick="addItem()">Ajouter au Stock</button>
    </div>
    
    <button class="btn-admin" style="background:var(--success); color:#000;" onclick="exportData()">💾 GENERER CODE GITHUB</button>
    <p style="font-size:10px; color:var(--dim)">Clique ici pour récupérer le code à coller sur GitHub.</p>
    <textarea id="export-area" readonly></textarea>

    <div id="admin-list" style="margin-top:20px;"></div>
</div>

<script>
    // --- DATABASE (MODIFIE CETTE LISTE CI-DESSOUS POUR TES CLIENTS) ---
    let items = [
        { name: "@ogzy", type: "TikTok 4L", bin: "150$", co: "90$" },
        { name: "@star", type: "IG 4L", bin: "300$", co: "210$" }
    ];

    function render() {
        const container = document.getElementById('items-container');
        document.getElementById('count-stock').innerText = items.length;
        container.innerHTML = '';
        items.forEach((item, index) => {
            container.innerHTML += `
                <div class="item">
                    <div class="item-header"><span class="item-name">${item.name}</span><span class="item-type">${item.type}</span></div>
                    <div class="bid-info">
                        <div><span class="bid-label">BIN</span><span class="bid-val" style="color:var(--accent)">${item.bin}</span></div>
                        <div><span class="bid-label">C/O</span><span class="bid-val" style="color:var(--success)">${item.co}</span></div>
                    </div>
                    <button class="buy-btn" onclick="window.open('https://t.me/TON_PSEUDO?text=Buy ${item.name}')">ACHETER</button>
                </div>`;
        });
    }

    function login() {
        if(document.getElementById('adm-user').value === "zg" && document.getElementById('adm-pass').value === "zg") {
            document.getElementById('admin-auth').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            renderAdmin();
        }
    }

    function addItem() {
        items.push({
            name: document.getElementById('p-name').value,
            type: document.getElementById('p-type').value,
            bin: document.getElementById('p-bin').value,
            co: document.getElementById('p-co').value
        });
        render(); renderAdmin();
    }

    function deleteItem(i) { items.splice(i, 1); render(); renderAdmin(); }

    function exportData() {
        const area = document.getElementById('export-area');
        area.style.display = "block";
        area.value = "let items = " + JSON.stringify(items, null, 4) + ";";
        area.select();
        alert("Code généré ! Copie la ligne verte et remplace-la dans ton fichier GitHub.");
    }

    function renderAdmin() {
        const list = document.getElementById('admin-list');
        list.innerHTML = '<hr style="border:1px solid #222; margin:20px 0;">';
        items.forEach((item, index) => {
            list.innerHTML += `<div style="background:#222; padding:10px; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:12px;">${item.name}</span>
                <button onclick="deleteItem(${index})" style="background:red; border:none; color:white; padding:5px; border-radius:5px; font-size:10px;">Suppr</button>
            </div>`;
        });
    }

    function showAdminAuth() { document.getElementById('admin-auth').style.display = 'block'; }
    function hideAdmin() { document.getElementById('admin-auth').style.display = 'none'; document.getElementById('admin-panel').style.display = 'none'; }

    render();
</script>
</body>
</html>
