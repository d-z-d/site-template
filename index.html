<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Market WebApp</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #ff3e3e; /* Couleur MW de ton image */
            --text: #ffffff;
            --dim: #888888;
            --border: #2b2b2b;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Header style image */
        .market-title { font-size: 22px; font-weight: 800; margin-bottom: 25px; }
        .market-title span { color: var(--accent); }

        /* Stats Boxes */
        .stats-row { display: flex; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .stat-box { 
            background: var(--card); flex: 1; padding: 12px 15px; 
            border-radius: 10px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .label { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .val { font-weight: bold; font-size: 14px; }
        .val.active { color: #4CAF50; }

        /* Filtres horizontaux */
        .filters { 
            display: flex; gap: 8px; width: 100%; max-width: 400px; 
            overflow-x: auto; padding-bottom: 10px; scrollbar-width: none;
        }
        .filter-btn {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); padding: 7px 16px; border-radius: 8px;
            font-size: 13px; cursor: pointer; white-space: nowrap;
        }
        .filter-btn.active { background: #fff; color: #000; font-weight: bold; border: none; }

        /* Liste des Usernames */
        .items-grid { width: 100%; max-width: 400px; margin-top: 20px; }
        .item-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-weight: bold; font-size: 16px; }
        .user-price { color: var(--accent); font-size: 14px; margin-top: 4px; }
        .buy-btn { 
            background: #fff; color: #000; border: none; 
            padding: 8px 15px; border-radius: 6px; font-weight: bold; font-size: 12px;
        }

        /* Nav Footer */
        .footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 15px 0;
            font-size: 11px; color: var(--dim); text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="market-title"><span>#OG</span> Market</div>

    <div class="stats-row">
        <div class="stat-box"><span class="label">Stock</span><span class="val" style="color:var(--accent)">14</span></div>
        <div class="stat-box"><span class="label">Status</span><span class="val active">Active</span></div>
    </div>

    <div class="filters">
        <button class="filter-btn active">All</button>
        <button class="filter-btn">3c/L</button>
        <button class="filter-btn">4c/L</button>
        <button class="filter-btn">Double/Triple</button>
    </div>

    <div class="items-grid">
        <div class="item-card">
            <div class="user-info">
                <span class="user-name">@x7q</span>
                <span class="user-price">150.00$</span>
            </div>
            <button class="buy-btn">BUY</button>
        </div>
    </div>

    <div class="footer">
        <span style="color: #fff; border-bottom: 2px solid #fff; padding-bottom: 5px;">Store</span>
        <span>Cart (0)</span>
    </div>

</body>
</html>
